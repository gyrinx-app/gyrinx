{% if weapon_traits %}
    <div>
        <label class="form-label">Traits</label>
        <input type="search"
               class="form-control form-control-sm mb-2"
               placeholder="Filter..."
               data-filter-target="wp_traits_list"
               oninput="(function(el){ var t=el.value.toLowerCase(); var container=document.getElementById(el.dataset.filterTarget); var items=container.querySelectorAll('[data-filter-label]'); var visible=0; for(var i=0;i&lt;items.length;i++){ var show=items[i].dataset.filterLabel.toLowerCase().indexOf(t)!==-1; items[i].style.display=show?'':'none'; if(show) visible++; } container.querySelector('[data-filter-empty]').style.display=visible===0?'':'none'; })(this)">
        {# djlint:off H021 #}
        <div id="wp_traits_list"
             class="border rounded p-2"
             style="max-height: 16rem;
                    overflow-y: auto">
            {% for trait in weapon_traits %}
                <div class="mb-1" data-filter-label="{{ trait.name }}">
                    <input type="checkbox"
                           name="wp_traits"
                           value="{{ trait.pk }}"
                           id="wp_traits_{{ forloop.counter }}"
                           class="form-check-input"
                           {% if trait.pk|stringformat:"s" in selected_trait_ids %}checked{% endif %}>
                    <label for="wp_traits_{{ forloop.counter }}">{{ trait.name }}</label>
                </div>
            {% endfor %}
            {# djlint:off H021 #}
            <div class="text-secondary small" data-filter-empty style="display: none;">No matches.</div>
        </div>
    </div>
{% endif %}
<div>
    <label class="form-label">Weapon stats</label>
    <div class="d-flex flex-wrap gap-2">
        {% for stat in weapon_stats %}
            <div class="text-center stat-input-cell">
                <label class="form-label small mb-1">{{ stat.short_name }}</label>
                <input type="text"
                       name="wp_{{ stat.field_name }}"
                       value="{{ stat.value|default:'' }}"
                       class="form-control form-control-sm text-center"
                       placeholder="{{ stat.placeholder }}"
                       maxlength="12">
            </div>
        {% endfor %}
    </div>
    <div class="form-text">Set each stat value, or leave blank for unset.</div>
</div>
