{% load custom_tags color_tags %}
{% comment %}A list row for the home page. Expects `list` in context.{% endcomment %}
<div class="hstack gap-3 position-relative">
    <div class="d-flex flex-column gap-1">
        <h3 class="mb-0 h5">
            <a href="{% url 'core:list' list.id %}">{% list_with_theme list %}</a>
        </h3>
        <div class="hstack column-gap-2 row-gap-1 flex-wrap">
            <div>{{ list.content_house_name }}{% house_icon list.content_house_cached %}</div>
            <div class="badge text-bg-primary">{% credits list.facts_with_fallback.wealth %}</div>
        </div>
    </div>
    <div class="ms-auto d-md-none">
        <a href="{% url 'core:list' list.id %}" class="p-3 stretched-link">
            <i class="bi-chevron-right"></i>
        </a>
    </div>
</div>
