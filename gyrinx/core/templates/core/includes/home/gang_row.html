{% load custom_tags color_tags %}
{% comment %}A campaign gang row for the home page. Expects `gang` in context.{% endcomment %}
<div class="hstack gap-3 position-relative">
    <div class="d-flex flex-column gap-1">
        <h3 class="mb-0 h5">
            <a href="{% url 'core:list' gang.id %}" class="linked">{% list_with_theme gang %}</a>
        </h3>
        <div class="hstack column-gap-2 row-gap-1 flex-wrap">
            <div>{{ gang.content_house.name }}{% house_icon gang.content_house %}</div>
            <div class="badge text-bg-primary">{% credits gang.facts_with_fallback.wealth %}</div>
            <div>
                <a href="{% url 'core:campaign' gang.campaign.id %}"
                   class="icon-link linked">
                    <i class="bi-award"></i> {{ gang.campaign.name }}
                </a>
            </div>
        </div>
    </div>
    <div class="ms-auto d-md-none">
        <a href="{% url 'core:list' gang.id %}" class="p-3 stretched-link">
            <i class="bi-chevron-right"></i>
        </a>
    </div>
</div>
