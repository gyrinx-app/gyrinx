{% widthratio step total_steps 100 as progress %}
<div class="progress mb-1"
     role="progressbar"
     aria-label="Step {{ step }} of {{ total_steps }}"
     aria-valuenow="{{ progress }}"
     aria-valuemin="0"
     aria-valuemax="100">
    {# djlint:off #}
    <div class="progress-bar" style="width: {{ progress }}%">Step {{ step }} of {{ total_steps }}</div>
    {# djlint:on #}
</div>
<h1 class="h3 mb-0">{{ title }}</h1>
